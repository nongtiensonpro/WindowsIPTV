name: Build Windows IPTV Player

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore IptvApp.slnx

    - name: Build
      run: dotnet build IptvApp.slnx -c ${{ matrix.configuration }} --no-restore

    - name: Publish (Self-Contained x64)
      run: |
        dotnet publish IptvApp/IptvApp.csproj `
          -c ${{ matrix.configuration }} `
          -r win-x64 `
          --self-contained true `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WindowsIPTV-${{ matrix.configuration }}-x64
        path: IptvApp/bin/${{ matrix.configuration }}/net10.0-windows10.0.26100.0/win-x64/publish/
