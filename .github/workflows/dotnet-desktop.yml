name: Build & Release Windows IPTV Player

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Download libmpv (Native dependency)
      shell: pwsh
      run: |
        Write-Host "Querying latest mpv-dev release from GitHub..."
        $releaseInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers @{ "User-Agent" = "GitHub-Actions" }
        
        # Find the mpv-dev-x86_64 asset (non-v3 for maximum compatibility)
        $asset = $releaseInfo.assets | Where-Object { $_.name -match "^mpv-dev-x86_64-\d" } | Select-Object -First 1
        
        if (-not $asset) {
          Write-Error "Could not find mpv-dev-x86_64 asset in latest release!"
          exit 1
        }
        
        $downloadUrl = $asset.browser_download_url
        $fileName = $asset.name
        Write-Host "Found: $fileName"
        Write-Host "Downloading from: $downloadUrl"
        
        Invoke-WebRequest -Uri $downloadUrl -OutFile $fileName -MaximumRedirection 5
        Write-Host "Downloaded: $(Get-Item $fileName | Select-Object -ExpandProperty Length) bytes"
        
        Write-Host "Extracting..."
        7z x $fileName -o"mpv-extract" -y
        
        Copy-Item "mpv-extract\libmpv-2.dll" -Destination ".\libmpv-2.dll" -Force
        Write-Host "libmpv-2.dll ready: $((Get-Item .\libmpv-2.dll).Length / 1MB) MB"

    - name: Restore dependencies
      run: dotnet restore IptvApp.slnx

    - name: Build
      run: dotnet build IptvApp.slnx -c Release --no-restore

    - name: Publish (Self-Contained x64)
      run: |
        dotnet publish IptvApp/IptvApp.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true `
          -p:PublishTrimmed=false

    - name: Package Release ZIP
      shell: pwsh
      run: |
        $publishDir = "IptvApp/bin/Release/net10.0-windows10.0.26100.0/win-x64/publish"
        $version = if ($env:GITHUB_REF -match "^refs/tags/v(.+)$") { $Matches[1] } else { "dev" }
        $zipName = "WindowsIPTV-v${version}-x64.zip"
        
        Write-Host "Packaging $publishDir -> $zipName"
        Compress-Archive -Path "$publishDir\*" -DestinationPath $zipName -Force
        
        $sizeMB = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
        Write-Host "Created: $zipName ($sizeMB MB)"
        
        # Export for next steps
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
        echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Upload build artifact (for PRs & pushes)
      uses: actions/upload-artifact@v4
      with:
        name: WindowsIPTV-x64
        path: ${{ env.ZIP_PATH }}

    # === Release (only when pushing a tag like v1.0.0) ===
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "Windows IPTV Player v${{ env.VERSION }}"
        body: |
          ## 📺 Windows IPTV Player v${{ env.VERSION }}
          
          ### 🚀 Cập nhật mới nhất (v1.0.0-pre)
          - **Kiểm tra sức khỏe kênh (Channel Health Checker):** Tích hợp công cụ quét chất lượng kênh IPTV, tự động nhận diện kênh Sống/Chết/Timeout/Không xác định cho cả 3 định dạng luồng (HTTP, HLS m3u8, UDP/RTP multicast). Hỗ trợ quét đa luồng song song, báo cáo tiến độ real-time và xuất danh sách kênh còn sống ra file M3U chuẩn.
          - **Tối ưu hóa độ trễ:** Khắc phục triệt để lỗi trễ hình (Live Edge Delay ~50s) và lệch âm thanh (A/V Desync) trên luồng UDP Multicast bằng cách thiết lập Zero-buffer FFmpeg và Demuxer Thread.
          - **Tương thích DPI:** Xử lý lỗi video hiển thị nhỏ và lệch góc trên các màn hình có tỉ lệ thu phóng (DPI Scaling) như 125% hoặc 150%.
          - **Khắc phục lỗi Crash .NET 10:** Tự động gọi thẳng VTable và Hardcode IID qua COM Interop, giải quyết hoàn toàn lỗi văng ứng dụng (`System.InvalidCastException`, `PlatformNotSupportedException`) khi khởi động trên Windows 11.
          - **Căn chỉnh UI:** Fix lỗi lệch hàng các phím điều khiển (Chế độ hiển thị) để giao diện thẳng tắp và đồng bộ.
          - **Tính năng AI:** Tích hợp bộ chuyển đổi Shader thời gian thực giúp tăng độ nét (AMD CAS) và kích thước 4K (FSRCNNX) cho các luồng SD/HD.
          
          ### 📥 Hướng dẫn cài đặt
          1. Tải file **WindowsIPTV-v${{ env.VERSION }}-x64.zip** bên dưới
          2. Giải nén vào thư mục bất kỳ
          3. Chạy trực tiếp file **IptvApp.exe**
          
          > **Yêu cầu hệ thống:** Windows 10/11 (x64) — Không cần cài đặt thêm .NET Runtime, ứng dụng đã đóng gói Self-Contained.
        draft: false
        prerelease: ${{ contains(github.ref, '-pre') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        files: ${{ env.ZIP_PATH }}
