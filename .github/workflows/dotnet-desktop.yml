name: Build Windows IPTV Player

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Download libmpv (Native dependency)
      shell: pwsh
      run: |
        Write-Host "Querying latest mpv-dev release from GitHub..."
        $releaseInfo = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers @{ "User-Agent" = "GitHub-Actions" }
        
        # Find the mpv-dev-x86_64 asset (non-v3 for maximum compatibility)
        $asset = $releaseInfo.assets | Where-Object { $_.name -match "^mpv-dev-x86_64-\d" } | Select-Object -First 1
        
        if (-not $asset) {
          Write-Error "Could not find mpv-dev-x86_64 asset in latest release!"
          exit 1
        }
        
        $downloadUrl = $asset.browser_download_url
        $fileName = $asset.name
        Write-Host "Found: $fileName"
        Write-Host "Downloading from: $downloadUrl"
        
        Invoke-WebRequest -Uri $downloadUrl -OutFile $fileName -MaximumRedirection 5
        Write-Host "Downloaded: $(Get-Item $fileName | Select-Object -ExpandProperty Length) bytes"
        
        Write-Host "Extracting..."
        7z x $fileName -o"mpv-extract" -y
        
        # Copy libmpv-2.dll to the project root (where .csproj expects it via ..\libmpv-2.dll)
        Copy-Item "mpv-extract\libmpv-2.dll" -Destination ".\libmpv-2.dll" -Force
        Write-Host "libmpv-2.dll ready: $((Get-Item .\libmpv-2.dll).Length / 1MB) MB"

    - name: Restore dependencies
      run: dotnet restore IptvApp.slnx

    - name: Build
      run: dotnet build IptvApp.slnx -c ${{ matrix.configuration }} --no-restore

    - name: Publish (Self-Contained x64)
      run: |
        dotnet publish IptvApp/IptvApp.csproj `
          -c ${{ matrix.configuration }} `
          -r win-x64 `
          --self-contained true `
          -p:WindowsPackageType=None `
          -p:WindowsAppSDKSelfContained=true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WindowsIPTV-${{ matrix.configuration }}-x64
        path: IptvApp/bin/${{ matrix.configuration }}/net10.0-windows10.0.26100.0/win-x64/publish/
